<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的紀錄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#FAF7F5;--surface:#FFFFFF;--surface2:#F5EEE9;--border:#E8DDD6;--border2:#D9C9BF;--text:#2C1F1A;--text2:#7A6058;--text3:#B09A90;--accent:#C4826A;--accent2:#A8624C;--green:#7A9E7E;--green-bg:#EEF4EF;--blue:#7A8FA8;--blue-bg:#EEF2F7;--amber:#B8904A;--amber-bg:#FBF3E4;--purple:#9A7AAA;--purple-bg:#F3EEF7;--red:#B85050;--red-bg:#FAEAEA;--radius:10px;--radius-lg:16px;--shadow:0 2px 12px rgba(196,130,106,0.10),0 4px 24px rgba(0,0,0,0.06);--shadow-sm:0 1px 4px rgba(196,130,106,0.08)}
[data-theme="dark"]{--bg:#1E1512;--surface:#2A1E19;--surface2:#352620;--border:#4A3028;--border2:#5E3E34;--text:#F5EDE8;--text2:#C4A090;--text3:#8A6858;--accent:#E0A088;--accent2:#C4826A;--green:#8EBF92;--green-bg:#1A2E1C;--blue:#90AACC;--blue-bg:#1A2030;--amber:#D4A860;--amber-bg:#2A2010;--purple:#B898CC;--purple-bg:#22183A;--red:#D47070;--red-bg:#2A1010}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;letter-spacing:.01em}
.wrap{max-width:1000px;margin:0 auto;padding:0 24px 60px}
header{display:flex;align-items:center;justify-content:space-between;padding:32px 0 28px}
.logo-text{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:700;color:var(--text)}
.logo-sub{font-size:13px;color:var(--text3);margin-top:3px}
.btn-icon{background:none;border:1px solid var(--border);border-radius:8px;width:36px;height:36px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s}
.btn-icon:hover{background:var(--surface2);color:var(--text)}

/* Hero cards */
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:40px}
.hero-card{border-radius:var(--radius-lg);padding:28px;cursor:pointer;text-decoration:none;display:block;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.hero-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.hero-card.books{background:linear-gradient(135deg,#C4826A 0%,#D4A090 100%)}
.hero-card.exhibition{background:linear-gradient(135deg,#9A7AAA 0%,#7A8FA8 100%)}
.hero-card .hc-icon{font-size:28px;margin-bottom:14px;opacity:.85;color:rgba(255,255,255,0.9)}
.hero-card .hc-title{font-family:'Noto Serif TC',serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:6px}
.hero-card .hc-sub{font-size:13px;color:rgba(255,255,255,.65)}
.hero-card .hc-stats{display:flex;gap:20px;margin-top:20px}
.hero-card .hc-stat .n{font-size:22px;font-weight:700;color:#fff;font-family:'Noto Serif TC',serif}
.hero-card .hc-stat .l{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.hero-card .hc-arrow{position:absolute;top:24px;right:24px;color:rgba(255,255,255,.5);font-size:18px}

/* Section */
.section{margin-bottom:36px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;color:var(--text)}
.section-link{font-size:13px;color:var(--accent2);text-decoration:none;display:flex;align-items:center;gap:4px}
.section-link:hover{text-decoration:underline}

/* Summary stats */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:40px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);text-align:center}
.sum-card .n{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:700;color:var(--accent)}
.sum-card .l{font-size:11px;color:var(--text3);margin-top:4px}

/* Charts */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:40px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-sm)}
.chart-card h3{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:16px}
.chart-wrap{position:relative;height:200px}

/* Recent */
.recent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.recent-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;transition:box-shadow .2s,transform .15s}
.recent-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.rc-icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.rc-icon.book{background:var(--amber-bg);color:var(--amber)}
.rc-icon.exh{background:var(--blue-bg);color:var(--blue)}
.rc-title{font-size:14px;font-weight:500;line-height:1.3;margin-bottom:2px}
.rc-sub{font-size:12px;color:var(--text3)}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500;margin-top:4px}
.b-done{background:var(--green-bg);color:var(--green)}
.b-reading{background:var(--blue-bg);color:var(--blue)}
.b-unread{background:var(--surface2);color:var(--text2)}
.b-visited{background:var(--green-bg);color:var(--green)}
.b-planned{background:var(--blue-bg);color:var(--blue)}

.divider{border:none;border-top:1px solid var(--border);margin:36px 0}
.empty-msg{text-align:center;padding:24px;color:var(--text3);font-size:13px}

@media(max-width:600px){
  .wrap{padding:0 14px 40px}
  .hero-grid{grid-template-columns:1fr}
  .charts-grid{grid-template-columns:1fr}
  .logo-text{font-size:22px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="logo-text">我的紀錄</div>
      <div class="logo-sub" id="today-date"></div>
    </div>
    <button class="btn-icon" onclick="toggleTheme()" id="theme-btn" title="切換主題"><i class="fa-solid fa-moon"></i></button>
  </header>

  <!-- Hero -->
  <div class="hero-grid">
    <a href="books.html" class="hero-card books" id="hero-books">
      <div class="hc-arrow"><i class="fa-solid fa-arrow-right"></i></div>
      <div class="hc-icon"><i class="fa-solid fa-book"></i></div>
      <div class="hc-title">我的書庫</div>
      <div class="hc-sub">書籍與漫畫管理</div>
      <div class="hc-stats" id="books-hero-stats"></div>
    </a>
    <a href="exhibition.html" class="hero-card exhibition" id="hero-exh">
      <div class="hc-arrow"><i class="fa-solid fa-arrow-right"></i></div>
      <div class="hc-icon"><i class="fa-solid fa-image"></i></div>
      <div class="hc-title">我的展覽</div>
      <div class="hc-sub">展覽參觀紀錄</div>
      <div class="hc-stats" id="exh-hero-stats"></div>
    </a>
  </div>

  <!-- Summary -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">總覽統計</div>
      <div style="display:flex;align-items:center;gap:8px">
        <select id="year-filter" onchange="render()" style="font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;outline:none;cursor:pointer"></select>
      </div>
    </div>
    <div class="summary-grid" id="summary-grid"></div>
  </div>

  <!-- Charts -->
  <div class="charts-grid">
    <div class="chart-card">
      <h3><i class="fa-solid fa-chart-line" style="margin-right:6px"></i>每月花費（NT$）</h3>
      <div class="chart-wrap"><canvas id="spend-chart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3><i class="fa-solid fa-chart-pie" style="margin-right:6px"></i>書籍閱讀狀態</h3>
      <div class="chart-wrap"><canvas id="status-chart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3><i class="fa-solid fa-chart-bar" style="margin-right:6px"></i>展覽類型分布</h3>
      <div class="chart-wrap"><canvas id="exh-type-chart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3><i class="fa-solid fa-chart-simple" style="margin-right:6px"></i>書籍分類分布</h3>
      <div class="chart-wrap"><canvas id="book-cat-chart"></canvas></div>
    </div>
  </div>

  <hr class="divider">

  <!-- Recent -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">最近新增</div>
    </div>
    <div class="recent-grid" id="recent-grid"></div>
  </div>
</div>

<script>
// Theme
function toggleTheme(){
  const d=document.documentElement;
  const isDark=d.getAttribute('data-theme')==='dark';
  d.setAttribute('data-theme',isDark?'':'dark');
  document.getElementById('theme-btn').innerHTML=isDark?'<i class="fa-solid fa-moon"></i>':'<i class="fa-solid fa-sun"></i>';
  localStorage.setItem('bkmgr-theme',isDark?'light':'dark');
  renderCharts();
}
(function(){
  const t=localStorage.getItem('bkmgr-theme')||'light';
  if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.getElementById('theme-btn').innerHTML='<i class="fa-solid fa-sun"></i>';}
})();

// Date
const now=new Date();
document.getElementById('today-date').textContent=now.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

// Load all data
function loadAllBooks(){
  const keys=['bkmgr-general','bkmgr-books','bkmgr-magazine','bkmgr-indie'];
  let all=[];
  keys.forEach(k=>{try{const d=localStorage.getItem(k);if(d)all=[...all,...JSON.parse(d)];}catch(e){}});
  return all;
}
function loadManga(){try{const d=localStorage.getItem('bkmgr-manga');return d?JSON.parse(d):[];}catch(e){return[];}}
function loadExhibitions(){try{const d=localStorage.getItem('exh-data');return d?JSON.parse(d):[];}catch(e){return[];}}

function buildYearOptions(books, manga, exh){
  const years = new Set();
  books.forEach(b=>{ if(b.date) years.add(b.date.slice(0,4)); });
  manga.forEach(m=>{ (m.purchases||[]).forEach(p=>{ if(p.date) years.add(p.date.slice(0,4)); }); });
  exh.forEach(e=>{ if(e.date) years.add(e.date.slice(0,4)); });
  const now = new Date().getFullYear().toString();
  years.add(now);
  const sorted = [...years].sort((a,b)=>b-a);
  const sel = document.getElementById('year-filter');
  const cur = sel.value || now;
  sel.innerHTML = '<option value="all">全部年份</option>' + sorted.map(y=>`<option value="${y}"${y===cur?' selected':''}>${y} 年</option>`).join('');
  if(!sel.value) sel.value = cur;
}

function render(){
  const books=loadAllBooks();
  const manga=loadManga();
  const exh=loadExhibitions();
  buildYearOptions(books, manga, exh);
  const selectedYear = document.getElementById('year-filter').value;

  // Hero stats
  const totalBooks=books.length+manga.length;
  const doneBooks=books.filter(b=>b.status==='done').length;
  document.getElementById('books-hero-stats').innerHTML=`
    <div class="hc-stat"><div class="n">${totalBooks}</div><div class="l">總書籍</div></div>
    <div class="hc-stat"><div class="n">${doneBooks}</div><div class="l">已讀</div></div>
    <div class="hc-stat"><div class="n">${manga.length}</div><div class="l">漫畫系列</div></div>`;
  const visitedExh=exh.filter(e=>e.status==='visited').length;
  const plannedExh=exh.filter(e=>e.status==='planned').length;
  document.getElementById('exh-hero-stats').innerHTML=`
    <div class="hc-stat"><div class="n">${exh.length}</div><div class="l">總展覽</div></div>
    <div class="hc-stat"><div class="n">${visitedExh}</div><div class="l">已參觀</div></div>
    <div class="hc-stat"><div class="n">${plannedExh}</div><div class="l">預計</div></div>`;

  // Summary
  const bookSpend=books.reduce((s,b)=>s+(b.price||0),0);
  const mangaSpend=manga.reduce((s,m)=>s+(m.purchases||[]).reduce((ss,p)=>ss+(p.price||0),0),0);
  const exhSpend=exh.filter(e=>e.status==='visited').reduce((s,e)=>s+(e.price||0),0);
  document.getElementById('summary-grid').innerHTML=`
    <div class="sum-card"><div class="n">${books.length+manga.length}</div><div class="l">書籍 + 漫畫</div></div>
    <div class="sum-card"><div class="n">${exh.length}</div><div class="l">展覽紀錄</div></div>
    <div class="sum-card"><div class="n">${books.filter(b=>b.status==='reading').length}</div><div class="l">閱讀中</div></div>
    <div class="sum-card"><div class="n">NT$${(bookSpend+mangaSpend+exhSpend).toLocaleString()}</div><div class="l">總花費</div></div>
    <div class="sum-card"><div class="n">${manga.reduce((s,m)=>s+(m.owned||0),0)}</div><div class="l">漫畫總集數</div></div>
    <div class="sum-card"><div class="n">${visitedExh}</div><div class="l">參觀展覽數</div></div>`;

  renderCharts(books,manga,exh,selectedYear);
  renderRecent(books,manga,exh);
}

let charts={};
function renderCharts(books,manga,exh,yr){
  books=books||loadAllBooks();
  manga=manga||loadManga();
  exh=exh||loadExhibitions();
  yr=yr||document.getElementById('year-filter').value||'all';

  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const gridColor=isDark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)';
  const textColor=isDark?'#9E9690':'#6B6560';
  Chart.defaults.color=textColor;

  // 1. Monthly spend
  const months=[];
  if(yr==='all'){
    // show all years grouped by month per year
    const allYears=[...new Set([
      ...books.map(b=>b.date?b.date.slice(0,4):null),
      ...manga.flatMap(m=>(m.purchases||[]).map(p=>p.date?p.date.slice(0,4):null)),
      ...exh.map(e=>e.date?e.date.slice(0,4):null)
    ].filter(Boolean))].sort();
    allYears.forEach(y=>{
      for(let m=1;m<=12;m++){
        const key=`${y}-${String(m).padStart(2,'0')}`;
        months.push({key,label:`${y}/${m}月`});
      }
    });
  } else {
    for(let m=1;m<=12;m++){
      const key=`${yr}-${String(m).padStart(2,'0')}`;
      months.push({key,label:`${m}月`});
    }
  }
  const booksByMonth=months.map(m=>books.filter(b=>b.date&&b.date.startsWith(m.key)).reduce((s,b)=>s+(b.price||0),0));
  const mangaByMonth=months.map(m=>manga.reduce((s,mg)=>s+(mg.purchases||[]).filter(p=>p.date&&p.date.startsWith(m.key)).reduce((ss,p)=>ss+(p.price||0),0),0));
  const exhByMonth=months.map(m=>exh.filter(e=>e.date&&e.date.startsWith(m.key)&&e.status==='visited').reduce((s,e)=>s+(e.price||0),0));
  if(charts.spend)charts.spend.destroy();
  charts.spend=new Chart(document.getElementById('spend-chart'),{
    type:'bar',
    data:{labels:months.map(m=>m.label),datasets:[
      {label:'書籍',data:booksByMonth,backgroundColor:'rgba(61,43,31,0.7)',borderRadius:4},
      {label:'漫畫',data:mangaByMonth,backgroundColor:'rgba(124,92,69,0.7)',borderRadius:4},
      {label:'展覽',data:exhByMonth,backgroundColor:'rgba(29,78,122,0.7)',borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:10,font:{size:11}}}},scales:{x:{grid:{color:gridColor},ticks:{font:{size:11}}},y:{grid:{color:gridColor},ticks:{font:{size:11}}}}}
  });

  // filter by year for non-chart stats
  const filteredBooks = yr==='all' ? books : books.filter(b=>b.date&&b.date.startsWith(yr));
  const filteredExh = yr==='all' ? exh : exh.filter(e=>e.date&&e.date.startsWith(yr));

  // 2. Book status pie
  const unread=books.filter(b=>b.status==='unread').length;
  const reading=books.filter(b=>b.status==='reading').length;
  const done=books.filter(b=>b.status==='done').length;
  if(charts.status)charts.status.destroy();
  charts.status=new Chart(document.getElementById('status-chart'),{
    type:'doughnut',
    data:{labels:['未讀','閱讀中','已讀'],datasets:[{data:[unread,reading,done],backgroundColor:['#C8BFB3','#6BAED6','#5CB88A'],borderWidth:0,hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:10,font:{size:11}}}}}
  });

  // 3. Exhibition type bar
  const exhTypes={};
  filteredExh.forEach(e=>{if(e.type)exhTypes[e.type]=(exhTypes[e.type]||0)+1;});
  const etKeys=Object.keys(exhTypes);
  if(charts.exhType)charts.exhType.destroy();
  if(etKeys.length){
    charts.exhType=new Chart(document.getElementById('exh-type-chart'),{
      type:'bar',
      data:{labels:etKeys,datasets:[{data:etKeys.map(k=>exhTypes[k]),backgroundColor:'rgba(29,78,122,0.75)',borderRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid:{color:gridColor},ticks:{font:{size:11}},beginAtZero:true},y:{grid:{display:false},ticks:{font:{size:11}}}}}
    });
  } else {
    document.getElementById('exh-type-chart').parentElement.innerHTML='<h3><i class="fa-solid fa-chart-bar" style="margin-right:6px"></i>展覽類型分布</h3><div class="empty-msg">尚無資料</div>';
  }

  // 4. Book category bar
  const bookCats={};
  filteredBooks.forEach(b=>{const c=b.cat||'未分類';bookCats[c]=(bookCats[c]||0)+1;});
  const bcKeys=Object.keys(bookCats).sort((a,b)=>bookCats[b]-bookCats[a]).slice(0,6);
  if(charts.bookCat)charts.bookCat.destroy();
  if(bcKeys.length){
    charts.bookCat=new Chart(document.getElementById('book-cat-chart'),{
      type:'bar',
      data:{labels:bcKeys,datasets:[{data:bcKeys.map(k=>bookCats[k]),backgroundColor:'rgba(61,43,31,0.75)',borderRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid:{color:gridColor},ticks:{font:{size:11}},beginAtZero:true},y:{grid:{display:false},ticks:{font:{size:11}}}}}
    });
  } else {
    document.getElementById('book-cat-chart').parentElement.innerHTML='<h3><i class="fa-solid fa-chart-simple" style="margin-right:6px"></i>書籍分類分布</h3><div class="empty-msg">尚無資料</div>';
  }
}

function renderRecent(books,manga,exh){
  const smap={unread:'b-unread',reading:'b-reading',done:'b-done'};
  const slabel={unread:'未讀',reading:'閱讀中',done:'已讀'};
  const recentBooks=books.sort((a,b)=>b.id-a.id).slice(0,4).map(b=>`
    <a href="books.html" class="recent-card">
      <div class="rc-icon book"><i class="fa-solid fa-book"></i></div>
      <div><div class="rc-title">${b.name}</div><div class="rc-sub">${b.author||'—'}</div><span class="badge ${smap[b.status]||'b-unread'}">${slabel[b.status]||'未讀'}</span></div>
    </a>`).join('');
  const recentExh=exh.sort((a,b)=>b.id-a.id).slice(0,4).map(e=>`
    <a href="exhibition.html" class="recent-card">
      <div class="rc-icon exh"><i class="fa-solid fa-image"></i></div>
      <div><div class="rc-title">${e.name}</div><div class="rc-sub">${e.venue||'—'}</div><span class="badge ${e.status==='visited'?'b-visited':'b-planned'}">${e.status==='visited'?'已參觀':'預計參觀'}</span></div>
    </a>`).join('');
  const grid=document.getElementById('recent-grid');
  grid.innerHTML=recentBooks+recentExh||'<div class="empty-msg">還沒有任何紀錄</div>';
}

render();
</script>
</body>
</html>
